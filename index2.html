<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contador de Aniversario</title>
    <style>
body {
      background: linear-gradient(to right, #ff9a9e, #fad0c4);
      font-family: 'Arial', sans-serif;
      text-align: center;
      color: #333;
      overflow: hidden;
    }
    h1 {
      margin-top: 50px;
      font-size: 3em;
      color: #b30059;
    }
    p {
      font-size: 1.5em;
      margin: 20px;
    }
    .heart {
      position: absolute;
      font-size: 2em;
      color: red;
      animation: float 6s infinite;
    }
    @keyframes float {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-600px); opacity: 0; }
    }
    button {
      background-color: #b30059;
      color: white;
      border: none;
      padding: 15px 30px;
      font-size: 1.2em;
      cursor: pointer;
      border-radius: 10px;
      margin-top: 30px;
    }
    #mensaje {
      display: none;
      font-size: 1.5em;
      margin-top: 20px;
      color: #b30059;
    }
        #contador {
            font-size: 24px;
            margin-top: 20px;
            background: #fff0f5;
            padding: 15px;
            border-radius: 10px;
            display: inline-block;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <h1>💖 Nuestro Aniversario 💖</h1>
    <div id="contador"></div>
      <!-- Corazones flotando -->
  <div class="heart" style="left:20%;">❤️</div>
  <div class="heart" style="left:40%;">💖</div>
  <div class="heart" style="left:60%;">💕</div>
  <div class="heart" style="left:80%;">💘</div>
  <!-- Botón interactivo -->
  <button onclick="mostrarMensaje()">Haz clic para ver cuánto te amo, Elenita preciosa</button>
  <div id="mensaje">TE AMO MAS DE LO QUE CUALQUIER PERSONA EN ESTE MUNDO TE PUEDE AMOR. <br>
TE AMO AUNQUE NO TE BAÑES Y SEAS SUCIA.<br>
TE AMO CON TODO MI SER 💞</div>
  
    <br>    <br>    <br>    <br>   
<img src="e1.jpg" alt="Nuestra foto juntos" width="300" style="margin-top:20px; border-radius:15px; box-shadow:0 0 10px rgba(0,0,0,0.3);">
    <script>
        function mostrarMensaje() {
      document.getElementById("mensaje").style.display = "block";
    }
        // Cambia esta fecha por la de tu aniversari
        const fechaAniversario = new Date("2025-07-23"); 

        function actualizarContador() {
            const hoy = new Date();
            const diferencia = hoy - fechaAniversario;
            const dias = Math.floor(diferencia / (1000 * 60 * 60 * 24));
            document.getElementById("contador").innerHTML = 
                "Han pasado " + dias + " días desde nuestro primer día juntos 💕";
        }

        actualizarContador();
    </script>
</body>
</html>
